sqlite: &sqlite
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  busy_timeout: 10000

development:
  primary:
    <<: *sqlite
    database: storage/development.sqlite3
  queue:
    <<: *sqlite
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *sqlite
    database: storage/test.sqlite3
  queue:
    <<: *sqlite
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate

desktop:
  primary:
    <<: *sqlite
    database: <%= ENV.fetch("CURSORHELP_PRIMARY_DB") { File.join(ENV.fetch("CURSORHELP_USER_DATA", ENV.fetch("CURSORHELP_DATA_DIR", File.join(Dir.home, ".cursorhelp"))), "desktop.sqlite3") } %>
  queue:
    <<: *sqlite
    database: <%= ENV.fetch("CURSORHELP_QUEUE_DB") { File.join(ENV.fetch("CURSORHELP_USER_DATA", ENV.fetch("CURSORHELP_DATA_DIR", File.join(Dir.home, ".cursorhelp"))), "desktop_queue.sqlite3") } %>
    migrations_paths: db/queue_migrate

production:
  primary:
    adapter: postgresql
    encoding: unicode
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  cache:
    adapter: postgresql
    encoding: unicode
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    migrations_paths: db/cache_migrate
  queue:
    adapter: postgresql
    encoding: unicode
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    migrations_paths: db/queue_migrate
